services:
  local-asr-service:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: local-asr-service:gpu
    ports:
      - "${LOCAL_ASR_PORT:-8765}:8765"
    env_file:
      - .env
    environment:
      LOCAL_ASR_HOST: "0.0.0.0"
      HF_HOME: "/models/hf"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-0}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
    volumes:
      - asr-model-cache:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - "${NVIDIA_VISIBLE_DEVICES:-0}"
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  asr-model-cache:
